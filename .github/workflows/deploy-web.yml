name: Deploy Web Companion

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Inject OAuth credentials
        run: |
          sed -i "s/YOUR_GOOGLE_CLIENT_ID_HERE/${{ secrets.WEB_GOOGLE_CLIENT_ID }}/g" web/oauth-config.js
          sed -i "s/YOUR_GOOGLE_CLIENT_SECRET_HERE/${{ secrets.WEB_GOOGLE_CLIENT_SECRET }}/g" web/oauth-config.js

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./web/
          server-dir: ./
          exclude: |
            **/cgi-bin/**
            **/assets/**
