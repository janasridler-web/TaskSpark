<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 320px; height: 120px; overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: #1e3a2f; border-radius: 12px;
    -webkit-app-region: drag;
    user-select: none;
  }
  #wrap { padding: 14px 16px; }
  #title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 3px; }
  #sub   { font-size: 12px; color: #9ecfb5; margin-bottom: 12px; }
  #btns  { display: flex; gap: 8px; -webkit-app-region: no-drag; }
  .btn {
    flex: 1; padding: 9px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 700; font-family: 'Segoe UI', sans-serif;
    cursor: pointer; transition: filter 0.15s;
  }
  #btn-break { background: #2d6a4f; color: #fff; }
  #btn-break:hover { filter: brightness(1.2); }
  #btn-focus { background: #333; color: #aaa; }
  #btn-focus:hover { background: #444; color: #fff; }
</style>
</head>
<body>
<div id="wrap">
  <div id="title">⏰ Time for a break!</div>
  <div id="sub">You've been working for <span id="duration">30</span> minutes.</div>
  <div id="btns">
    <button class="btn" id="btn-break" onclick="choose('break')">☕ Take a Break</button>
    <button class="btn" id="btn-focus" onclick="choose('focus')">💪 I'm Focused</button>
  </div>
</div>
<script>
  function choose(choice) {
    breakPromptAPI.choose(choice);
  }
  // Listen for the duration sent from main process
  breakPromptAPI.onDuration((mins) => {
    document.getElementById('duration').textContent = mins;
  });
</script>
</body>
</html>
